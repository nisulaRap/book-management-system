name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # -------------------------
      # Build User Service
      # -------------------------
      - name: Build User Service
        working-directory: ./user-service
        run: mvn clean package -DskipTests

      # -------------------------
      # Build Book Service
      # -------------------------
      - name: Build Book Service
        working-directory: ./book-service
        run: mvn clean package -DskipTests

      # -------------------------
      # Docker Login
      # -------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -------------------------
      # Build & Push User Image
      # -------------------------
      - name: Build and Push User Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      # -------------------------
      # Build & Push Book Image
      # -------------------------
      - name: Build and Push Book Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./book-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/book-service:latest